<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศาสนกิจ พระมหาฉัตรชัย ชยญาณเมธี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5D4037;    /* สีน้ำตาลเข้ม */
            --secondary: #8D6E63;  /* สีน้ำตาลอ่อน */
            --accent: #D4AF37;     /* สีทองเมทัลลิก */
            --bg: #FDFBF7;         /* สีพื้นหลังครีมขาว */
            --text-dark: #202020;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ส่วนหัว (Header) */
        header { 
            background: linear-gradient(135deg, var(--primary) 0%, #3E2723 100%); 
            color: white; 
            text-align: center; 
            padding: 3.5rem 1rem 3rem; 
            border-bottom: 6px solid var(--accent); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .header-title { font-size: 2.4rem; font-weight: 700; margin: 0; color: var(--accent); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .header-subtitle { font-size: 1.5rem; font-weight: 600; margin: 12px 0 5px 0; }
        .header-position { font-size: 1.1rem; font-weight: 300; opacity: 0.9; margin: 0; }

        .container { 
            flex-grow: 1;
            width: 100%;
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px 15px; 
        }

        /* หัวข้อแต่ละส่วน */
        .section-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin: 40px 0 15px; 
            display: flex; 
            align-items: center; 
        }
        .section-title::before {
            content: ''; display: inline-block; width: 6px; height: 28px; background: var(--accent); margin-right: 12px; border-radius: 3px;
        }

        /* กล่องใส่ปฏิทิน */
        .calendar-box {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .calendar-box:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        /* เน้นกล่องงานที่กำลังจะถึง */
        .box-upcoming {
            border-top: 5px solid var(--accent);
        }
        /* เน้นกล่องหน้ารวมงาน */
        .box-all {
            border-top: 5px solid var(--secondary);
        }

        .iframe-container {
            position: relative;
            width: 100%;
        }
        
        .iframe-agenda { height: 400px; } /* ความสูงของรายการงาน */
        .iframe-month { height: 650px; } /* ความสูงของปฏิทินรวม */

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        /* ส่วนท้าย (Footer) */
        footer {
            background-color: #f1ede4;
            color: #666;
            text-align: center;
            padding: 30px 15px;
            margin-top: 50px;
            font-size: 0.95rem;
            border-top: 1px solid #e0dcd2;
        }
        .credit { font-weight: 700; color: var(--primary); margin-top: 10px; font-size: 1.1rem; }

        @media (max-width: 600px) {
            .header-title { font-size: 2rem; }
            .header-subtitle { font-size: 1.3rem; }
            .iframe-agenda { height: 350px; }
            .iframe-month { height: 500px; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">ศาสนกิจ</h1>
    <h2 class="header-subtitle">พระมหาฉัตรชัย ชยญาณเมธี</h2>
    <p class="header-position">รองเจ้าคณะจังหวัดหนองบัวลำภู</p>
</header>

<div class="container">
    
    <div class="section-title">งานที่กำลังจะถึง</div>
    <div class="calendar-box box-upcoming">
        <div class="iframe-container iframe-agenda">
            <iframe src="https://calendar.google.com/calendar/embed?src=cakrphathrxathcakr%40gmail.com&ctz=Asia%2FBangkok&mode=AGENDA&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23ffffff" frameborder="0" scrolling="yes"></iframe>
        </div>
    </div>

    <div class="section-title">หน้ารวมงานทั้งหมด</div>
    <div class="calendar-box box-all">
        <div class="iframe-container iframe-month">
            <iframe src="https://calendar.google.com/calendar/embed?src=cakrphathrxathcakr%40gmail.com&ctz=Asia%2FBangkok&mode=MONTH&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&bgcolor=%23ffffff" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

</div>

<footer>
    <div>ระบบตรวจสอบตารางศาสนกิจ (อัปเดตอัตโนมัติ)</div>
    <div class="credit">จัดทำโดย: พระมหาจักรภัทร คมฺภรญาณเมธี</div>
</footer>

</body>
</html>

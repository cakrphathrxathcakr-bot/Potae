<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางศาสนกิจ - วัด...</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8D6E63;
            --accent: #D4AF37;
            --bg: #FDF6E3;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: var(--primary);
            color: white;
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            border-bottom: 5px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .container {
            width: 95%;
            max-width: 1000px;
            margin: 20px 0;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        /* ทำให้ปฏิทินยืดหยุ่นตามหน้าจอ (Responsive) */
        .calendar-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 75%; /* อัตราส่วน 4:3 */
        }
        .calendar-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        footer {
            margin-top: 20px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
        }
        .btn-manual {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">ตารางศาสนกิจพระเถระ</h1>
    <p style="margin:5px 0 0 0; opacity: 0.9;">วัด... (อัปเดตแบบเรียลไทม์)</p>
</header>

<div class="container">
    <div class="calendar-wrapper">
        <iframe src="https://calendar.google.com/calendar/embed?src=cakrphathrxathcakr%40gmail.com&ctz=Asia%2FBangkok" style="border: 0" frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<div style="text-align: center;">
    <p>หากต้องการนัดหมายล่วงหน้า โปรดติดต่อไวยาวัจกร</p>
    <a href="https://calendar.google.com/calendar/u/0?cid=Y2FrcnBoYXRocnhhdGhjYWtyQGdtYWlsLmNvbQ" target="_blank" class="btn-manual">➕ เพิ่มลงในปฏิทินของคุณ</a>
</div>

<footer>
    <p>© 2026 ระบบจัดการตารางงานพระเถระ | ข้อมูลอัปเดตจาก Google Calendar</p>
</footer>

</body>
</html>

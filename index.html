<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ศาสนกิจ พระมหาฉัตรชัย ชยญาณเมธี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* โทนสี Modern Temple (Zen / Minimalist) */
            --primary: #4A3B32;    /* สีน้ำตาลเทา (Ash Brown) ดูสงบ ทันสมัย */
            --secondary: #8E7F75;  /* สีเทาอมน้ำตาล (Warm Gray) สำหรับข้อความรอง */
            --accent: #C5A059;     /* สีทองอ่อน (Soft Gold) เรียบหรู ไม่ตะโกน */
            --holiday: #D9534F;    /* สีแดงอมส้มโมเดิร์น สำหรับวันหยุด */
            --bg: #F9F8F6;         /* พื้นหลังสีขาวครีม (Off-white) สบายตา */
            --surface: #FFFFFF;    /* สีพื้นหลังการ์ด */
            --text-dark: #2C2A28;  /* สีตัวหนังสือหลัก ไม่อ่อนและไม่ดำสนิท */
            --border: #EAE6DF;     /* สีเส้นขอบอ่อนๆ */
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 0; 
            color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- ส่วนหัว (Modern Header) --- */
        header { 
            background: linear-gradient(135deg, #332A25 0%, #1A1512 100%); 
            color: white; text-align: center; padding: 3.5rem 1rem 3rem; 
            border-bottom: 4px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header-title { font-size: 2.2rem; font-weight: 700; margin: 0; color: var(--accent); letter-spacing: 1px; }
        .header-subtitle { font-size: 1.4rem; font-weight: 500; margin: 12px 0 5px 0; }
        .header-position { font-size: 1.05rem; font-weight: 300; opacity: 0.8; margin: 0; letter-spacing: 0.5px; }

        .container { flex-grow: 1; width: 100%; max-width: 900px; margin: 40px auto; padding: 0 15px; }

        .section-title { 
            font-size: 1.4rem; font-weight: 700; color: var(--primary); margin: 0 0 20px 0; 
            display: flex; align-items: center; letter-spacing: 0.5px;
        }
        .section-title::before {
            content: ''; display: inline-block; width: 4px; height: 24px; 
            background: var(--accent); margin-right: 12px; border-radius: 4px;
        }

        /* --- ระบบปฏิทิน (ย้ายมาไว้ด้านบน) --- */
        .calendar-section { 
            background: var(--surface); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            padding: 25px; margin-bottom: 50px; border: 1px solid var(--border);
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-btn { 
            background: var(--bg); border: 1px solid var(--border); padding: 8px 18px; 
            border-radius: 20px; cursor: pointer; font-size: 1rem; color: var(--primary); 
            transition: all 0.3s ease; font-weight: 600;
        }
        .cal-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .cal-month-year { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day-name { font-weight: 600; color: var(--secondary); padding: 10px 0; font-size: 0.9rem; text-transform: uppercase; }
        
        .cal-cell { 
            padding: 10px 5px; border-radius: 12px; cursor: pointer; position: relative; 
            min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            transition: all 0.2s ease; border: 1px solid transparent; background: #FAFAFA;
        }
        .cal-cell:hover { background: #F0EEEB; transform: translateY(-2px); }
        .cal-cell.empty { background: transparent; cursor: default; }
        .cal-cell.empty:hover { transform: none; }
        
        .cal-date-num { font-size: 1.1rem; font-weight: 600; color: var(--text-dark); z-index: 2; margin-bottom: 4px; }
        .cal-cell.today { background: #FFFFFF; border: 2px solid var(--accent); }
        .cal-cell.today .cal-date-num { color: var(--accent); }
        .cal-cell.selected { background: var(--primary); border: 1px solid var(--primary); transform: scale(1.05); box-shadow: 0 8px 20px rgba(74, 59, 50, 0.2); }
        .cal-cell.selected .cal-date-num { color: white; }

        .dot-group { display: flex; gap: 4px; justify-content: center; align-items: center; }
        .event-dot { width: 6px; height: 6px; background-color: var(--accent); border-radius: 50%; }
        .holiday-dot { width: 6px; height: 6px; background-color: var(--holiday); border-radius: 50%; }
        .cal-cell.selected .event-dot, .cal-cell.selected .holiday-dot { background-color: white; }

        .cal-legend { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 0.85rem; color: var(--secondary); padding-top: 20px; border-top: 1px solid var(--border); }
        .legend-item { display: flex; align-items: center; gap: 6px; }

        /* รายละเอียดงานที่ถูกกด */
        .day-details-box { 
            margin-top: 25px; padding: 25px; background: #FFFFFF; border-radius: 16px; 
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: none; 
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .day-details-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 12px;}
        .holiday-banner { background: #FFF5F5; color: #C53030; padding: 12px 16px; border-radius: 10px; margin-bottom: 15px; font-weight: 500; font-size: 1.05rem; display: flex; align-items: center; border-left: 4px solid #FC8181; }
        .wanphra-banner { background: #F8F5F0; color: var(--primary); padding: 12px 16px; border-radius: 10px; margin-bottom: 15px; font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; border-left: 4px solid var(--accent); }
        .detail-item { margin-bottom: 18px; padding-left: 15px; border-left: 3px solid var(--accent); }
        .detail-item:last-child { margin-bottom: 0; }
        .detail-time { font-weight: 600; color: var(--secondary); font-size: 1rem; margin-bottom: 4px;}
        .detail-title { font-size: 1.15rem; color: var(--text-dark); margin: 0 0 4px 0; font-weight: 600; }
        .detail-loc { font-size: 0.95rem; color: var(--secondary); display: flex; align-items: center; gap: 5px;}
        .empty-day { color: var(--secondary); font-style: italic; text-align: center; padding: 20px; background: #FAFAFA; border-radius: 12px; }

        /* --------------------------------------------------- */
        /* ★ ตารางงานที่กำลังจะถึง (อยู่ด้านล่างปฏิทิน) ★ */
        /* --------------------------------------------------- */
        .schedule-wrapper { margin-bottom: 50px; }
        
        .schedule-row {
            display: grid; grid-template-columns: 2fr 1.5fr 3fr 2.5fr; gap: 15px;
            padding: 18px 25px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center;
        }
        
        .schedule-header {
            background-color: transparent; color: var(--secondary); font-weight: 600; font-size: 0.9rem;
            text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 12px;
        }
        
        .schedule-row:not(.schedule-header) { transition: background 0.2s; }
        .schedule-row:not(.schedule-header):hover { background-color: #FAFAFA; }
        .schedule-row:last-child { border-radius: 0 0 16px 16px; border-bottom: none; }
        .schedule-row:nth-child(2) { border-radius: 16px 16px 0 0; } /* แถวแรกของข้อมูล */
        .schedule-row.single-item { border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border); }

        .col-date { font-weight: 600; color: var(--primary); font-size: 1.05rem; }
        .col-time { font-weight: 600; font-size: 1.05rem; color: var(--secondary); }
        .col-title { font-weight: 600; font-size: 1.1rem; }
        .col-location { color: var(--secondary); font-size: 0.95rem; }
        .status-now { display: inline-flex; align-items: center; gap: 5px; background: #EDF7ED; color: #2E7D32; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-top: 6px; }
        .status-now::before { content: ''; width: 6px; height: 6px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        /* --- ปรับแต่งสำหรับมือถือ (Mobile Responsive) --- */
        @media (max-width: 768px) {
            .header-title { font-size: 1.8rem; }
            .header-subtitle { font-size: 1.2rem; }
            .container { margin: 25px auto; }
            
            .schedule-header { display: none; }
            .schedule-wrapper { display: flex; flex-direction: column; gap: 15px; }
            
            .schedule-row {
                display: flex; flex-direction: column; gap: 6px; padding: 20px;
                border-radius: 16px !important; border: 1px solid var(--border);
                border-left: 5px solid var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.03) !important;
            }

            .col-date { font-size: 0.95rem; color: var(--secondary); margin-bottom: 5px; }
            .col-time { font-size: 1rem; color: var(--primary); }
            .col-title { font-size: 1.2rem; color: var(--text-dark); margin-top: 2px; }
            .col-location { font-size: 0.95rem; color: var(--secondary); margin-top: 5px; }
            
            .calendar-section { padding: 20px 15px; }
            .cal-cell { min-height: 50px; padding: 8px 2px; border-radius: 10px;}
            .cal-date-num { font-size: 1.05rem; }
            .cal-day-name { font-size: 0.85rem; padding: 5px 0; }
            .cal-month-year { font-size: 1.2rem; }
        }

        /* ส่วนท้าย */
        footer { background-color: #EBE8E3; color: var(--secondary); text-align: center; padding: 30px 15px; margin-top: 40px; font-size: 0.95rem; }
        .credit { font-weight: 600; color: var(--primary); margin-top: 8px; font-size: 1.05rem; }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">ศาสนกิจ</h1>
    <h2 class="header-subtitle">พระมหาฉัตรชัย ชยญาณเมธี</h2>
    <p class="header-position">รองเจ้าคณะจังหวัดหนองบัวลำภู</p>
</header>

<div class="container">
    
    <div class="section-title">ตรวจสอบวันว่าง / วันสำคัญ</div>
    <div class="calendar-section">
        <div class="cal-header">
            <button class="cal-btn" onclick="changeMonth(-1)">❮ เดือนก่อน</button>
            <div class="cal-month-year" id="cal-month-year">เดือน ปี</div>
            <button class="cal-btn" onclick="changeMonth(1)">เดือนหน้า ❯</button>
        </div>
        
        <div class="cal-grid">
            <div class="cal-day-name" style="color:#D9534F;">อา.</div>
            <div class="cal-day-name">จ.</div>
            <div class="cal-day-name">อ.</div>
            <div class="cal-day-name">พ.</div>
            <div class="cal-day-name">พฤ.</div>
            <div class="cal-day-name">ศ.</div>
            <div class="cal-day-name">ส.</div>
        </div>
        <div class="cal-grid" id="calendar-grid"></div>

        <div class="cal-legend">
            <div class="legend-item"><div class="event-dot"></div> มีศาสนกิจ</div>
            <div class="legend-item"><div class="holiday-dot"></div> วันสำคัญ</div>
        </div>

        <div class="day-details-box" id="day-details-box">
            <div class="day-details-title" id="day-details-title">รายละเอียดงาน</div>
            <div id="day-details-content"></div>
        </div>
    </div>

    <div class="section-title">ตารางงานที่กำลังจะถึง (10 งานล่าสุด)</div>
    <div class="schedule-wrapper" id="schedule-list">
        <div class="schedule-row single-item" style="justify-content: center; text-align: center; color: #8E7F75; padding: 40px;">
            ⏳ กำลังประมวลผลข้อมูล...
        </div>
    </div>

</div>

<footer>
    <div>ระบบตรวจสอบตารางศาสนกิจ (อัปเดตอัตโนมัติ)</div>
    <div class="credit">จัดทำโดย: พระมหาจักรภัทร คมฺภีรญาณเมธี</div>
</footer>

<script>
    const API_KEY = 'AIzaSyDMFzZarwGw0uN1uDl91zx34hJjmVpBITs'; 
    const CALENDAR_ID = 'cakrphathrxathcakr@gmail.com';
    const HOLIDAY_CALENDAR_ID = 'th.thai#holiday@group.v.calendar.google.com';

    let allEvents = [];
    let allHolidays = [];
    let eventsByDate = {}; 
    let holidaysByDate = {}; 
    
    let currentDate = new Date();
    let displayMonth = currentDate.getMonth();
    let displayYear = currentDate.getFullYear();

    const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    function formatTime(dateObj, isAllDay) {
        if (isAllDay) return "ตลอดวัน";
        return dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
    }

    async function fetchCalendarData() {
        const startStr = new Date(currentDate.getFullYear(), currentDate.getMonth() - 2, 1).toISOString(); 
        const endStr = new Date(currentDate.getFullYear(), currentDate.getMonth() + 4, 0).toISOString(); 

        const urlUser = `https://www.googleapis.com/calendar/v3/calendars/${CALENDAR_ID}/events?key=${API_KEY}&timeMin=${startStr}&timeMax=${endStr}&singleEvents=true&orderBy=startTime`;
        const urlHoliday = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(HOLIDAY_CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${startStr}&timeMax=${endStr}&singleEvents=true&orderBy=startTime`;

        try {
            const [resUser, resHoliday] = await Promise.all([
                fetch(urlUser), fetch(urlHoliday).catch(() => null)
            ]);

            const dataUser = await resUser.json();
            allEvents = dataUser.items || [];

            if (resHoliday && resHoliday.ok) {
                const dataHoliday = await resHoliday.json();
                allHolidays = dataHoliday.items || [];
            }

            eventsByDate = {};
            allEvents.forEach(event => {
                const d = new Date(event.start.dateTime || event.start.date);
                const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                if (!eventsByDate[k]) eventsByDate[k] = [];
                eventsByDate[k].push(event);
            });

            holidaysByDate = {};
            allHolidays.forEach(event => {
                const d = new Date(event.start.dateTime || event.start.date);
                const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                if (!holidaysByDate[k]) holidaysByDate[k] = [];
                holidaysByDate[k].push(event);
            });

            renderScheduleList();
            renderCalendar();

        } catch (err) {
            document.getElementById('schedule-list').innerHTML = `<div class="schedule-row single-item" style="color:#D9534F; justify-content:center; padding:40px;"><b>เกิดข้อผิดพลาดในการโหลดข้อมูล:</b> ${err.message}</div>`;
        }
    }

    function renderScheduleList() {
        const listContainer = document.getElementById('schedule-list');
        const now = new Date();
        
        const upcomingEvents = allEvents.filter(event => {
            if(event.summary && event.summary.includes('วันพระ') && !event.start.dateTime) return false;
            const endTime = new Date(event.end.dateTime || event.end.date);
            return event.end.dateTime ? endTime > now : (new Date(event.end.date).getTime() + 86400000 > now.getTime());
        }).slice(0, 10); // แสดงแค่ 10 งาน

        if (upcomingEvents.length === 0) {
            listContainer.innerHTML = '<div class="schedule-row single-item" style="justify-content:center; text-align:center; padding:50px; color: #8E7F75;">ไม่มีกำหนดการศาสนกิจในช่วงนี้</div>';
            return;
        }

        let html = `
            <div class="schedule-row schedule-header">
                <div class="col-date">วัน/เดือน/ปี</div>
                <div class="col-time">เวลา</div>
                <div class="col-title">ศาสนกิจ</div>
                <div class="col-location">สถานที่</div>
            </div>
        `;

        upcomingEvents.forEach(event => {
            const start = new Date(event.start.dateTime || event.start.date);
            const end = new Date(event.end.dateTime || event.end.date);
            
            const dateLabel = start.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
            const timeLabel = formatTime(start, !event.start.dateTime);
            
            const isNow = (new Date() >= start && new Date() <= end) && event.start.dateTime;
            const statusHtml = isNow ? `<div class="status-now">ขณะนี้</div>` : '';

            html += `
                <div class="schedule-row">
                    <div class="col-date">${dateLabel}</div>
                    <div class="col-time">${timeLabel} ${statusHtml}</div>
                    <div class="col-title">${event.summary || 'ไม่ได้ระบุชื่องาน'}</div>
                    <div class="col-location">📍 ${event.location || '-'}</div>
                </div>
            `;
        });
        
        listContainer.innerHTML = html;
    }

    function changeMonth(step) {
        displayMonth += step;
        if (displayMonth > 11) { displayMonth = 0; displayYear++; }
        if (displayMonth < 0) { displayMonth = 11; displayYear--; }
        renderCalendar();
        document.getElementById('day-details-box').style.display = 'none';
    }

    function renderCalendar() {
        document.getElementById('cal-month-year').innerText = `${monthNames[displayMonth]} ${displayYear + 543}`;
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        const firstDay = new Date(displayYear, displayMonth, 1).getDay();
        const daysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
        const today = new Date();
        const isCurrentMonth = (today.getMonth() === displayMonth && today.getFullYear() === displayYear);

        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += `<div class="cal-cell empty"></div>`;
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${displayYear}-${String(displayMonth+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            
            const dayEvents = eventsByDate[dateStr] || [];
            const dayHolidays = holidaysByDate[dateStr] || [];
            
            const hasRealEvent = dayEvents.some(e => !(e.summary && e.summary.includes('วันพระ') && !e.start.dateTime));
            const isWanPhra = dayEvents.some(e => e.summary && e.summary.includes('วันพระ'));
            
            let dotsHtml = '';
            if (dayHolidays.length > 0 || isWanPhra) dotsHtml += `<div class="holiday-dot"></div>`;
            if (hasRealEvent) dotsHtml += `<div class="event-dot"></div>`;

            let cellClass = 'cal-cell';
            if (isCurrentMonth && i === today.getDate()) cellClass += ' today';

            grid.innerHTML += `
                <div class="${cellClass}" onclick="selectDate('${dateStr}', this, ${i})">
                    <span class="cal-date-num">${i}</span>
                    <div class="dot-group">${dotsHtml}</div>
                </div>
            `;
        }
    }

    function selectDate(dateStr, cellElement, dayNum) {
        document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
        if(cellElement) cellElement.classList.add('selected');

        const detailsBox = document.getElementById('day-details-box');
        const detailsTitle = document.getElementById('day-details-title');
        const detailsContent = document.getElementById('day-details-content');

        const selectedDateObj = new Date(displayYear, displayMonth, dayNum);
        const niceDateStr = selectedDateObj.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        detailsTitle.innerText = `กำหนดการ: ${niceDateStr}`;

        const dayEvents = eventsByDate[dateStr] || [];
        const dayHolidays = holidaysByDate[dateStr] || [];
        
        let html = '';

        dayHolidays.forEach(h => {
            const isBuddhist = h.summary.includes('บูชา') || h.summary.includes('พรรษา');
            html += `<div class="holiday-banner">${isBuddhist ? '🪷' : '🇹🇭'} ${h.summary}</div>`;
        });

        const wanPhraEvents = dayEvents.filter(e => e.summary && e.summary.includes('วันพระ'));
        wanPhraEvents.forEach(wp => {
            html += `<div class="wanphra-banner">🪷 ${wp.summary}</div>`;
        });

        const realEvents = dayEvents.filter(e => !(e.summary && e.summary.includes('วันพระ') && !e.start.dateTime));
        
        if (dayHolidays.length === 0 && dayEvents.length === 0) {
            html = `<div class="empty-day">✨ วันนี้ไม่มีกำหนดการศาสนกิจ (ว่าง)</div>`;
        } else if (realEvents.length > 0) {
            realEvents.forEach(ev => {
                const st = new Date(ev.start.dateTime || ev.start.date);
                const timeStr = formatTime(st, !ev.start.dateTime);
                html += `
                    <div class="detail-item">
                        <div class="detail-time">⏰ ${timeStr}</div>
                        <div class="detail-title">${ev.summary || 'ไม่ได้ระบุชื่องาน'}</div>
                        <div class="detail-loc">📍 ${ev.location || 'ไม่ได้ระบุสถานที่'}</div>
                    </div>
                `;
            });
        }

        detailsContent.innerHTML = html;
        detailsBox.style.display = 'block';
        
        if (window.innerWidth <= 768) {
            setTimeout(() => { detailsBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
        }
    }

    fetchCalendarData();
</script>

</body>
</html>
